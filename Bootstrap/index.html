<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Learning</title>
    <!-- Bootstrap CSS -->
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1 class="text-primary text-center">Welcome to Bootstrap Learning</h1>
    <div class ="container bg-dark text-white p-3">
        This is a simple example of a Bootstrap container with dark background and white text.
    <!-- Fixed Width Container-->
    </div>
   <div class="container-fluid bg-warning p-3 mt-3 text-dark">
    <p class="lead">This is a simple example of a Bootstrap container-fluid with yellow background and black text.</p>
    <!-- Full Width Container -->    
</div>

<div class="container-fluid px-0">
    <div class="row">
        <div class="col-md-4 bg-primary p-3 text-center text-white mb-3">Column 1</div>
    </div>
    <div class="row">
        <div class="col-md-4 bg-warning p-3 text-center text-dark mb-3">Column 2</div>
    </div>
    <div class="row">
        <div class="col-md-4 bg-danger p-3 text-center text-white">Column 3</div>
    </div>
</div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
