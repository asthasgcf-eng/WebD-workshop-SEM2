<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2 id="demo">Inverted pyramid</h2>
    <script>
     let rows = 5;

     for(let i=rows; i>=1; i--){
     let st = "";

      for(let j=1; j<=i; j++){
        st += "* ";
    }

    console.log(st);
}
</script>
</body>
</html>
